spring:
  application:
    name: anitrack
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:D:/Users/12931/Desktop/anitrack/anime.db
    username:
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 1

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.ani: DEBUG

