<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeTrack - 番剧进度管理器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0f2f5;
            --bg-card: #fff;
            --bg-input: #fafafa;
            --text: #333;
            --text-secondary: #888;
            --text-muted: #aaa;
            --border: #e0e0e0;
            --border-light: #f2f3f5;
            --shadow: 0 1px 4px rgba(0,0,0,0.05);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.1);
            --accent: #667eea;
            --filter-bg: #eef0f5;
            --filter-hover: #dde0e8;
            --table-header: #f8f9fa;
            --table-hover: #f8f9ff;
            --cal-bg: #fafbfc;
            --modal-bg: rgba(0,0,0,0.45);
            --sidebar-bg: linear-gradient(180deg, #1a1a3e 0%, #16213e 100%);
            --sidebar-text: #ccc;
            --badge-watching-bg: #e8f0fe;
            --badge-watching-text: #1967d2;
            --badge-completed-bg: #e6f4ea;
            --badge-completed-text: #137333;
            --badge-dropped-bg: #f1f3f4;
            --badge-dropped-text: #5f6368;
            --badge-want-bg: #fef7e0;
            --badge-want-text: #b06000;
        }

        [data-theme="dark"] {
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #12122a;
            --text: #d4d4e0;
            --text-secondary: #999;
            --text-muted: #666;
            --border: #2a2a44;
            --border-light: #1f1f3a;
            --shadow: 0 1px 4px rgba(0,0,0,0.25);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
            --accent: #8b9cf7;
            --filter-bg: #1f1f3a;
            --filter-hover: #2a2a55;
            --table-header: #1e1e38;
            --table-hover: #1e1e40;
            --cal-bg: #1a1a30;
            --modal-bg: rgba(0,0,0,0.7);
            --badge-watching-bg: #1a2a5e;
            --badge-watching-text: #8bb4f8;
            --badge-completed-bg: #1a3a2a;
            --badge-completed-text: #5dbe7e;
            --badge-dropped-bg: #2a2a30;
            --badge-dropped-text: #999;
            --badge-want-bg: #3a2a10;
            --badge-want-text: #e0a030;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ========== Sidebar ========== */
        .sidebar {
            position: fixed; left: 0; top: 0; height: 100vh; width: 52px;
            background: var(--sidebar-bg); color: var(--sidebar-text);
            z-index: 100; overflow: hidden; transition: width 0.2s ease;
        }
        .sidebar:hover { width: 210px; }
        .sidebar-inner {
            width: 210px; padding: 16px 8px; display: flex;
            flex-direction: column; height: 100%; flex-shrink: 0;
        }
        .sidebar .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; flex-shrink: 0;
            margin: 0 auto; transition: margin 0.2s;
        }
        .sidebar:hover .avatar { margin: 0; }
        .sidebar .fade-text { white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
        .sidebar:hover .fade-text { opacity: 1; }
        .sidebar .user-name { color: #fff; font-size: 14px; font-weight: 600; margin-top: 8px; }
        .sidebar .user-since { color: #888; font-size: 11px; margin-top: 2px; }
        .sidebar .divider {
            height: 1px; background: rgba(255,255,255,0.1); margin: 12px 4px; flex-shrink: 0;
            transition: margin 0.2s;
        }
        .sidebar:hover .divider { margin: 12px 0; }
        .sidebar .nav-label {
            font-size: 10px; text-transform: uppercase; color: #666;
            letter-spacing: 1px; margin-bottom: 4px; padding: 0 6px;
        }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 6px; border-radius: 6px; cursor: pointer; font-size: 13px;
            transition: background 0.15s; user-select: none;
        }
        .sidebar .nav-item:hover { background: rgba(255,255,255,0.08); }
        .sidebar .nav-item.active { background: rgba(102,126,234,0.3); color: #fff; }
        .sidebar .nav-item .icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
        .sidebar .nav-item .badge {
            margin-left: auto; background: rgba(255,255,255,0.15);
            padding: 1px 7px; border-radius: 10px; font-size: 11px;
        }
        .sidebar .nav-item.active .badge { background: rgba(255,255,255,0.3); }
        .sidebar .quick-item {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 6px; border-radius: 6px; cursor: pointer; font-size: 12px;
            transition: background 0.15s; user-select: none;
        }
        .sidebar .quick-item:hover { background: rgba(255,255,255,0.08); }
        .sidebar .quick-item.on { color: #ffc107; }
        .sidebar .quick-item .icon { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
        .sidebar .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 2px; }
        .sidebar .bottom-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 6px; border-radius: 6px; cursor: pointer; font-size: 13px;
            transition: background 0.15s; user-select: none;
        }
        .sidebar .bottom-btn:hover { background: rgba(255,255,255,0.1); }

        /* ========== Main Layout ========== */
        .main { margin-left: 52px; padding: 24px 32px; display: flex; justify-content: center; }
        .main-inner { width: 100%; max-width: 1300px; display: flex; flex-direction: column; gap: 16px; }

        /* ========== Card Base ========== */
        .card {
            background: var(--bg-card); border-radius: 12px; padding: 20px 24px;
            box-shadow: var(--shadow); transition: background 0.3s, box-shadow 0.3s;
        }
        .card-header {
            display: flex; align-items: center; gap: 8px;
            font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text);
        }
        .card-header .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* ========== Stats Cards ========== */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: var(--bg-card); border-radius: 12px; padding: 18px 20px; cursor: pointer;
            box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
            width: 4px; border-radius: 0 2px 2px 0;
        }
        .stat-card.total::before { background: #667eea; }
        .stat-card.watching::before { background: #f57c00; }
        .stat-card.today::before { background: #28a745; }
        .stat-card.completed::before { background: #6c757d; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .stat-card .stat-icon { font-size: 22px; margin-bottom: 4px; }
        .stat-card .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; }
        .stat-card .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        /* ========== Form ========== */
        .form-two-row { display: flex; flex-direction: column; gap: 10px; }
        .form-row-main, .form-row-sub { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .fg { display: flex; flex-direction: column; }
        .fg label { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .fg input, .fg select {
            padding: 8px 12px; font-size: 14px; border: 1.5px solid var(--border); border-radius: 8px;
            background: var(--bg-input); color: var(--text);
            transition: border-color 0.15s, background 0.3s, color 0.3s;
        }
        .fg input:focus, .fg select:focus { outline: none; border-color: var(--accent); background: var(--bg-card); }
        .fg-name { flex: 2; min-width: 140px; }
        .fg-url { flex: 2; min-width: 180px; position: relative; }
        .form-helper {
            font-size: 11px; color: var(--text-muted); text-decoration: none;
            margin-top: 4px; display: inline-block; transition: color 0.15s;
        }
        .form-helper:hover { color: var(--accent); }

        /* URL suggest panel */
        .url-suggest-panel {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
            background: var(--bg-card); border: 1.5px solid var(--border);
            border-radius: 10px; box-shadow: var(--shadow-hover);
            margin-top: 4px; padding: 8px; transition: background 0.3s;
            max-height: 380px; display: flex; flex-direction: column; overflow: hidden;
        }
        .url-suggest-header {
            font-size: 11px; color: var(--text-muted); padding: 4px 8px 6px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        #urlSuggestList {
            overflow-y: auto; flex: 1; min-height: 0;
        }
        .url-item {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 6px; border-radius: 6px;
            font-size: 12px; transition: background 0.1s;
        }
        .url-item:hover { background: var(--table-hover); }
        .url-item .url-label {
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            color: var(--text); font-weight: 500;
        }
        .url-item .url-actions {
            display: flex; gap: 4px; flex-shrink: 0;
        }
        .url-item .url-actions button {
            padding: 3px 8px; font-size: 11px; border-radius: 4px;
            border: 1px solid var(--border); cursor: pointer;
            background: transparent; color: var(--text-secondary);
            transition: all 0.1s;
        }
        .url-item .url-actions button:hover { border-color: var(--accent); color: var(--accent); }
        .url-item .url-actions .url-del { font-size: 13px; padding: 3px 5px; }
        .url-item .url-actions .url-del:hover { border-color: #dc3545; color: #dc3545; }
        .url-item .pin-btn {
            flex-shrink: 0; font-size: 14px; cursor: pointer;
            padding: 2px 4px; border-radius: 3px; color: var(--text-muted);
            transition: color 0.1s, transform 0.1s; user-select: none;
            background: none; border: none;
        }
        .url-item .pin-btn:hover { color: var(--accent); transform: scale(1.2); }
        .url-item .pin-btn.pinned { color: #f5a623; }
        .url-suggest-add {
            display: flex; gap: 4px; padding: 6px 8px 2px;
            border-top: 1px solid var(--border-light); margin-top: 4px;
            flex-shrink: 0;
        }
        .url-suggest-add input {
            flex: 1; padding: 5px 8px; font-size: 12px; border: 1.5px solid var(--border);
            border-radius: 6px; background: var(--bg-input); color: var(--text);
        }
        .url-suggest-add input:focus { outline: none; border-color: var(--accent); }
        .url-suggest-add button {
            padding: 5px 10px; font-size: 14px; border-radius: 6px;
            background: var(--accent); color: #fff; border: none; cursor: pointer;
        }
        .fg-sm { width: 80px; flex-shrink: 0; }
        .fg-md { width: 100px; flex-shrink: 0; }
        .fg-btn { display: flex; gap: 6px; align-items: flex-end; flex-shrink: 0; }

        button {
            cursor: pointer; border: none; font-weight: 500; font-size: 13px;
            padding: 8px 16px; border-radius: 8px; transition: all 0.15s;
        }
        button:hover { filter: brightness(1.08); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-warning { background: #fd7e14; color: #fff; }
        .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
        .btn-sm { padding: 4px 9px; font-size: 11px; border-radius: 5px; }
        .btn-lg { padding: 10px 20px; font-size: 14px; }

        /* ========== Toolbar ========== */
        .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .view-toggle { display: flex; background: var(--filter-bg); border-radius: 8px; padding: 3px; transition: background 0.3s; }
        .view-toggle button {
            padding: 6px 14px; font-size: 12px; border-radius: 6px;
            background: transparent; color: var(--text-secondary); border: none;
        }
        .view-toggle button.active { background: var(--bg-card); color: var(--text); font-weight: 600; box-shadow: var(--shadow); }
        .day-pills { display: flex; gap: 4px; }
        .day-pills button {
            padding: 5px 11px; font-size: 12px; border-radius: 7px;
            background: var(--filter-bg); color: var(--text-secondary); border: none;
            transition: background 0.3s, color 0.3s;
        }
        .day-pills button:hover { background: var(--filter-hover); }
        .day-pills button.active { background: var(--accent); color: #fff; }
        .day-pills button.today-ring { box-shadow: 0 0 0 2px #ffc107; }
        .search-wrap { margin-left: auto; position: relative; }
        .search-wrap input {
            padding: 7px 12px 7px 30px; font-size: 13px; border-radius: 8px;
            border: 1.5px solid var(--border); width: 200px;
            background: var(--bg-input); color: var(--text);
            transition: border-color 0.15s, width 0.2s, background 0.3s, color 0.3s;
        }
        .search-wrap input:focus { border-color: var(--accent); background: var(--bg-card); width: 240px; outline: none; }
        .search-wrap .s-icon { position: absolute; left: 10px; top: 8px; font-size: 13px; opacity: 0.5; }

        /* ========== Table ========== */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { border-bottom: 2px solid var(--border-light); }
        th {
            padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text-secondary);
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
            background: var(--table-header); transition: background 0.3s;
        }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
        tbody tr { transition: background 0.1s; }
        tbody tr:hover { background: var(--table-hover); }

        .name-link { color: var(--accent); cursor: pointer; }
        .name-link:hover { text-decoration: underline; }
        .tbl-cover {
            width: 36px; height: 50px; border-radius: 4px; object-fit: cover;
            flex-shrink: 0; background: var(--filter-bg);
        }
        .td-name { display: flex; align-items: center; gap: 10px; }
        .cal-cover {
            width: 30px; height: 42px; border-radius: 4px; object-fit: cover;
            flex-shrink: 0; background: var(--filter-bg);
        }

        .prog { display: flex; align-items: center; gap: 8px; }
        .prog-bar { width: 64px; height: 6px; background: var(--filter-bg); border-radius: 3px; overflow: hidden; flex-shrink: 0; transition: background 0.3s; }
        .prog-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .prog-num { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

        .badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .bd-watching { background: var(--badge-watching-bg); color: var(--badge-watching-text); }
        .bd-completed { background: var(--badge-completed-bg); color: var(--badge-completed-text); }
        .bd-dropped { background: var(--badge-dropped-bg); color: var(--badge-dropped-text); }
        .bd-want_to_watch { background: var(--badge-want-bg); color: var(--badge-want-text); }
        .act { display: flex; gap: 3px; flex-wrap: wrap; }

        /* ========== Calendar ========== */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        @media (max-width: 900px) { .cal-grid { grid-template-columns: repeat(4, 1fr); } }
        .cal-day {
            background: var(--cal-bg); border-radius: 10px; padding: 12px 8px;
            min-height: 150px; border: 2px solid transparent;
            transition: background 0.3s;
        }
        .cal-day.today { border-color: #ffc107; background: var(--bg-card); }
        .cal-day .day-name { text-align: center; font-weight: 700; font-size: 13px; margin-bottom: 2px; color: var(--text-secondary); }
        .cal-day.today .day-name { color: #f57c00; }
        .cal-day .day-num { text-align: center; font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
        .cal-day.today .day-num { color: #f57c00; }
        .cal-item {
            padding: 3px 6px; font-size: 11px; border-radius: 4px; margin-bottom: 2px;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: background 0.1s;
        }
        .cal-item:hover { background: var(--table-hover); }
        .cal-item .mbar { width: 24px; height: 3px; background: var(--filter-bg); border-radius: 2px; overflow: hidden; flex-shrink: 0; transition: background 0.3s; }
        .cal-item .mfill { height: 100%; border-radius: 2px; }
        .cal-item .mname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-size: 11px; color: var(--accent); }
        .cal-empty { text-align: center; color: var(--text-muted); font-size: 12px; padding-top: 16px; }

        /* ========== Heatmap ========== */
        .heatmap-section { margin-bottom: 0; }
        .heatmap-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px; cursor: pointer; user-select: none;
            background: var(--bg-card); border-radius: 12px;
            box-shadow: var(--shadow); font-size: 14px; font-weight: 600;
            transition: background 0.3s;
        }
        .heatmap-bar:hover { background: var(--table-hover); }
        .heatmap-bar .chevron {
            display: inline-block; font-size: 10px;
            transition: transform 0.2s;
        }
        .heatmap-bar.open .chevron { transform: rotate(90deg); }
        .heatmap-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease;
            background: var(--bg-card); border-radius: 0 0 12px 12px;
            box-shadow: var(--shadow);
        }
        .heatmap-body.open { max-height: 320px; }
        .heatmap-inner { padding: 0 20px 16px; }

        .heatmap-outer { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 8px; }
        .heatmap-day-col { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
        .heatmap-day-col span { font-size: 10px; height: 14px; line-height: 14px; color: var(--text-muted); }
        .heatmap-weeks { display: flex; gap: 3px; }
        .heatmap-week { display: flex; flex-direction: column; gap: 3px; }
        .heatmap-cell {
            width: 14px; height: 14px; border-radius: 2px;
            background: var(--filter-bg); cursor: default;
            transition: background 0.3s;
        }
        .heatmap-cell.has { cursor: pointer; }
        .heatmap-cell.has:hover { outline: 2px solid var(--accent); outline-offset: -1px; z-index: 1; }
        .heatmap-legend { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); margin-top: 10px; }
        .heatmap-legend span { width: 14px; height: 14px; border-radius: 2px; }

        /* ========== Status Filter Chips ========== */
        .filter-chips {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .filter-label {
            font-size: 12px; font-weight: 600; color: var(--text-secondary);
            margin-right: 4px; white-space: nowrap;
        }
        .chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 14px; font-size: 13px; border-radius: 20px;
            border: 1.5px solid var(--border); cursor: pointer;
            background: transparent; color: var(--text);
            transition: all 0.15s; user-select: none; white-space: nowrap;
            font-family: inherit;
        }
        .chip:hover { border-color: var(--accent); background: var(--table-hover); }
        .chip.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .chip .chip-badge {
            background: rgba(0,0,0,0.08); padding: 1px 7px; border-radius: 10px;
            font-size: 11px; font-weight: 500;
        }
        .chip.active .chip-badge { background: rgba(255,255,255,0.25); }

        /* Extra filters collapsible (heatmap style) */
        .extra-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 0; cursor: pointer; user-select: none;
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
            transition: color 0.15s;
        }
        .extra-bar:hover { color: var(--accent); }
        .extra-bar .chevron {
            display: inline-block; font-size: 10px;
            transition: transform 0.2s;
        }
        .extra-bar.open .chevron { transform: rotate(90deg); }
        .extra-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .extra-body.open { max-height: 60px; }
        .extra-inner { padding: 0 0 8px; display: flex; gap: 8px; }

        /* ========== Modal ========== */
        .modal-backdrop {
            position: fixed; inset: 0; background: var(--modal-bg);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .modal-backdrop.open { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: var(--bg-card); border-radius: 16px; padding: 28px;
            width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: translateY(20px); transition: transform 0.25s, background 0.3s;
        }
        .modal-backdrop.open .modal-card { transform: translateY(0); }
        .modal-close {
            position: absolute; top: 16px; right: 20px;
            font-size: 22px; cursor: pointer; color: var(--text-secondary);
            background: none; border: none; padding: 4px 8px; border-radius: 4px;
        }
        .modal-close:hover { color: var(--text); background: var(--filter-bg); }
        .modal-header { display: flex; gap: 16px; margin-bottom: 20px; align-items: flex-start; }
        .modal-cover {
            width: 100px; height: 140px; border-radius: 10px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent), #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: rgba(255,255,255,0.6);
        }
        .modal-info { flex: 1; }
        .modal-info h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
        .modal-info .meta { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
        .modal-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .modal-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        /* ========== Bangumi Modal ========== */
        .bgm-result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .bgm-card {
            display: flex; gap: 10px; padding: 10px; border-radius: 10px;
            border: 1.5px solid var(--border); cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .bgm-card:hover { border-color: var(--accent); background: var(--table-hover); }
        .bgm-card img {
            width: 60px; height: 84px; border-radius: 6px; object-fit: cover; flex-shrink: 0;
            background: var(--filter-bg);
        }
        .bgm-card .bgm-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
        .bgm-card .bgm-name { font-size: 13px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .bgm-card .bgm-meta { font-size: 11px; color: var(--text-secondary); }
        .bgm-card .bgm-score { color: #f5a623; font-weight: 600; }

        /* ========== Toast ========== */
        .toast {
            position: fixed; top: 20px; right: 20px; background: #333; color: #fff;
            padding: 12px 24px; border-radius: 8px; opacity: 0; transition: opacity 0.3s;
            z-index: 9999; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ========== Chat Widget ========== */
        .chat-fab {
            position: fixed; bottom: 24px; right: 24px; z-index: 300;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; cursor: pointer;
            font-size: 26px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(102,126,234,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(102,126,234,0.55); }
        .chat-fab.hidden { display: none; }

        .chat-panel {
            position: fixed; z-index: 300;
            width: 380px; height: 520px;
            background: var(--bg-card); border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            display: flex; flex-direction: column; overflow: hidden;
            transition: opacity 0.25s, transform 0.25s, background 0.3s;
            opacity: 0; transform: translateY(16px) scale(0.96);
            pointer-events: none;
        }
        .chat-panel.open {
            opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
        }

        .chat-panel-header {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; flex-shrink: 0;
            cursor: grab; user-select: none;
        }
        .chat-panel-header.dragging { cursor: grabbing; }
        .chat-panel-header .chat-title { flex: 1; font-size: 15px; font-weight: 600; pointer-events: none; }
        .chat-panel-header .chat-close {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .chat-panel-header .chat-close:hover { background: rgba(255,255,255,0.35); }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
            background: var(--bg);
        }
        .chat-message {
            max-width: 85%; padding: 10px 14px; border-radius: 14px;
            font-size: 13px; line-height: 1.55; word-break: break-word;
            animation: msgIn 0.25s ease;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .chat-message.user {
            align-self: flex-end; background: linear-gradient(135deg, #667eea, #7c6ff7);
            color: #fff; border-bottom-right-radius: 4px;
        }
        .chat-message.assistant {
            align-self: flex-start; background: var(--bg-card); color: var(--text);
            border: 1px solid var(--border); border-bottom-left-radius: 4px;
        }
        .chat-message.assistant p { margin: 0 0 6px; }
        .chat-message.assistant p:last-child { margin-bottom: 0; }
        .chat-message.assistant ul, .chat-message.assistant ol { margin: 4px 0; padding-left: 18px; }
        .chat-message.assistant li { margin-bottom: 2px; }
        .chat-message.assistant code {
            background: var(--filter-bg); padding: 1px 5px; border-radius: 4px;
            font-size: 12px;
        }
        .chat-message.assistant pre {
            background: var(--filter-bg); padding: 8px 12px; border-radius: 8px;
            overflow-x: auto; font-size: 12px; margin: 4px 0;
        }

        .chat-typing {
            align-self: flex-start; padding: 10px 16px;
            color: var(--text-secondary); font-size: 13px;
            display: flex; gap: 4px; align-items: center;
        }
        .chat-typing .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: dotBounce 1.4s infinite ease-in-out both; }
        .chat-typing .dot:nth-child(1) { animation-delay: -0.32s; }
        .chat-typing .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .chat-input-area {
            padding: 10px 12px; border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
        }
        .chat-quick-commands {
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .chat-quick-commands button {
            font-size: 11px; padding: 4px 10px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            color: var(--text-secondary); cursor: pointer;
            transition: all 0.15s; white-space: nowrap;
        }
        .chat-quick-commands button:hover {
            border-color: var(--accent); color: var(--accent); background: var(--table-hover);
        }
        .chat-input-row {
            display: flex; gap: 8px; align-items: flex-end;
        }
        .chat-input-row textarea {
            flex: 1; padding: 9px 12px; font-size: 13px;
            border: 1.5px solid var(--border); border-radius: 10px;
            background: var(--bg-input); color: var(--text);
            resize: none; min-height: 40px; max-height: 100px;
            font-family: inherit; line-height: 1.4;
            transition: border-color 0.15s, background 0.3s, color 0.3s;
        }
        .chat-input-row textarea:focus { outline: none; border-color: var(--accent); }
        .chat-input-row .chat-send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
            border: none; cursor: pointer; font-size: 18px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.15s, transform 0.15s;
        }
        .chat-input-row .chat-send-btn:hover { opacity: 0.9; transform: scale(1.05); }
        .chat-input-row .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .chat-resize-handle {
            position: absolute; bottom: 0; right: 0;
            width: 20px; height: 20px; cursor: nwse-resize;
            z-index: 10;
            background: linear-gradient(135deg, transparent 40%, var(--text-muted) 40%, var(--text-muted) 45%, transparent 45%, transparent 60%, var(--text-muted) 60%, var(--text-muted) 65%, transparent 65%);
        }

        @media (max-width: 480px) {
            .chat-panel { width: calc(100vw - 16px); height: 460px; }
            .chat-fab { bottom: 16px; right: 16px; }
        }
    </style>
</head>

    <!-- Form -->

            你好！我是 AI 追番助手 🤖<br>
            可以帮你查番剧、搜新番、生成周报、推荐番剧。试试下面的快捷指令吧！

        </div>

                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>

<script>
    const API_BASE = '/api/anime';
    const dayMap = {1:'周一',2:'周二',3:'周三',4:'周四',5:'周五',6:'周六',7:'周日'};
    const statusMap = {watching:'正在追', completed:'已完结', dropped:'已弃坑', want_to_watch:'想看'};
    const today = new Date().getDay() || 7;
    const todayStr = new Date().toISOString().slice(0,10);
    let allAnimeList = [];
    let selectedStatuses = new Set();
    let activeQuick = null;
    let dayFilter = null;
    let searchQuery = '';
    let viewMode = 'list';
    let searchTimer = null;

    // ========== Auth ==========
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/login.html'; throw new Error('未登录'); }
    const username = localStorage.getItem('username') || '用户';
    const createdAt = localStorage.getItem('createdAt') || '';
    document.getElementById('sidebarAvatar').textContent = username.charAt(0).toUpperCase();
    document.getElementById('sidebarName').textContent = username;
    if (createdAt) document.getElementById('sidebarSince').textContent = '注册于 ' + (createdAt.slice(0,10) || createdAt);

    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

    async function request(url, options = {}) {
        const res = await fetch(url, { headers: authHeaders(), ...options });
        if (res.status === 401) { localStorage.clear(); window.location.href = '/login.html'; throw new Error('登录已过期'); }
        if (!res.ok) throw new Error(await res.text());
        const text = await res.text();
        return text ? JSON.parse(text) : null;
    }

    // ========== Bangumi Search ==========
    let bgmResultsCache = [];
    function openBangumiSearch() {
        document.getElementById('bgmSearchInput').value = document.getElementById('name').value;
        document.getElementById('bgmBackdrop').classList.add('open');
        document.getElementById('bgmResults').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px">输入关键词后点击搜索</div>';
        document.body.style.overflow = 'hidden';
        setTimeout(() => document.getElementById('bgmSearchInput').focus(), 100);
    }

    function closeBgmModal(e) {
        if (e && e.target !== document.getElementById('bgmBackdrop')) return;
        document.getElementById('bgmBackdrop').classList.remove('open');
        document.body.style.overflow = '';
    }

    async function doBangumiSearch() {
        const kw = document.getElementById('bgmSearchInput').value.trim();
        if (!kw) return;
        const container = document.getElementById('bgmResults');
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px">搜索中...</div>';
        try {
            const res = await fetch(`/api/bangumi/search?keyword=${encodeURIComponent(kw)}`, { headers: authHeaders() });
            const raw = await res.json();
            if (!res.ok) {
                container.innerHTML = `<div style="text-align:center;color:#dc3545;padding:30px">${escapeHtml(raw.error || '搜索失败')}</div>`;
                return;
            }
            const results = (raw && Array.isArray(raw.data)) ? raw.data : [];
            if (results.length === 0) { container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px">未找到结果</div>'; return; }
            bgmResultsCache = results.map(r => ({
                name: r.name_cn || r.name || '未知',
                totalEp: typeof (r.eps_count || r.eps) === 'number' ? (r.eps_count || r.eps) : null,
                rating: r.rating && r.rating.score ? parseFloat(r.rating.score.toFixed(1)) : null,
                coverUrl: (r.images && r.images.common) || r.image || '',
                date: r.date || ''
            }));
            container.innerHTML = `<div class="bgm-result-grid">${bgmResultsCache.map((r, i) =>
                `<div class="bgm-card" onclick="selectBgmResult(${i})">
                    ${r.coverUrl ? `<img src="${r.coverUrl}" alt="" onerror="this.style.display='none'">` : '<div style="width:60px;height:84px;border-radius:6px;background:var(--filter-bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-muted)">🎬</div>'}
                    <div class="bgm-info">
                        <div class="bgm-name">${escapeHtml(r.name)}</div>
                        <div class="bgm-meta">${r.totalEp||'?'}集 ${r.date||''} ${r.rating ? `<span class="bgm-score">★${r.rating}</span>` : ''}</div>
                        <div style="font-size:10px;color:var(--accent);margin-top:2px">点击选择 →</div>
                    </div>
                </div>`
            ).join('')}</div>`;
        } catch (e) { container.innerHTML = `<div style="text-align:center;color:#dc3545;padding:30px">网络错误: ${escapeHtml(e.message)}</div>`; }
    }

    function selectBgmResult(i) {
        const data = bgmResultsCache[i];
        if (!data) return;
        document.getElementById('name').value = data.name || '';
        if (data.totalEp) document.getElementById('totalEp').value = data.totalEp;
        if (data.rating) document.getElementById('rating').value = data.rating;
        document.getElementById('editId').dataset.coverUrl = data.coverUrl || '';
        closeBgmModal();
        toast('已填入: ' + data.name);
    }

    // ========== URL Suggest ==========
    const URL_SUGGEST_API = '/api/url-suggestions';
    let urlSuggestions = [];

    async function loadUrlSuggestions() {
        try { urlSuggestions = await request(URL_SUGGEST_API); } catch (e) { urlSuggestions = []; }
        renderUrlSuggest();
    }

    function toggleUrlSuggest(e) {
        e.stopPropagation();
        const panel = document.getElementById('urlSuggestPanel');
        const isOpen = panel.style.display !== 'none';
        if (isOpen) {
            panel.style.display = 'none';
        } else {
            loadUrlSuggestions();
            panel.style.display = '';
        }
    }

    function renderUrlSuggest() {
        const list = document.getElementById('urlSuggestList');
        list.innerHTML = urlSuggestions.map(u => {
            const isCustom = !u.isPreset;
            const label = escapeHtml(u.label || u.url);
            const pinnedClass = u.pinned ? ' pinned' : '';
            return `<div class="url-item">
                <span class="pin-btn${pinnedClass}" onclick="toggleUrlPin(${u.id})" title="${u.pinned ? '取消置顶' : '置顶'}">置顶📌</span>
                <span class="url-label">${label}</span>
                <span class="url-actions">
                    <button onclick="fillUrl('${escapeHtml(u.url)}')" title="填入网址">填入</button>
                    <button onclick="jumpUrl(${u.id})" title="跳转至网站">跳转</button>
                    ${isCustom ? `<button class="url-del" onclick="deleteUrlSuggestion(${u.id})" title="删除">×</button>` : ''}
                </span>
            </div>`;
        }).join('');
    }

    function fillUrl(url) {
        document.getElementById('websiteUrl').value = url;
        document.getElementById('urlSuggestPanel').style.display = 'none';
    }

    function jumpUrl(suggestionId) {
        const u = urlSuggestions.find(s => s.id === suggestionId);
        if (!u) return;
        const name = document.getElementById('name').value.trim();
        let targetUrl = u.url;
        if (name && u.searchUrl) {
            targetUrl = u.searchUrl.replace(/\{keyword\}/g, encodeURIComponent(name));
        }
        window.open(targetUrl, '_blank');
    }

    async function addCustomUrl() {
        const label = document.getElementById('customUrlLabel').value.trim();
        const url = document.getElementById('customUrlInput').value.trim();
        const searchUrl = document.getElementById('customSearchUrl').value.trim();
        if (!url) return;
        if (!/^https?:\/\/.+/.test(url)) { toast('请输入完整网址（以 http:// 或 https:// 开头）'); return; }
        try {
            await request(URL_SUGGEST_API, {
                method: 'POST',
                body: JSON.stringify({ label: label || url, url: url, searchUrl: searchUrl || null })
            });
            document.getElementById('customUrlLabel').value = '';
            document.getElementById('customUrlInput').value = '';
            document.getElementById('customSearchUrl').value = '';
            toast('已添加网址');
            loadUrlSuggestions();
        } catch (err) { toast('添加失败: ' + err.message); }
    }

    async function deleteUrlSuggestion(id) {
        if (!confirm('确定删除此网址？')) return;
        try {
            await request(`${URL_SUGGEST_API}/${id}`, { method: 'DELETE' });
            toast('已删除');
            loadUrlSuggestions();
        } catch (err) { toast('删除失败: ' + err.message); }
    }

    async function toggleUrlPin(id) {
        try {
            await request(`${URL_SUGGEST_API}/${id}/pin`, { method: 'PUT' });
            loadUrlSuggestions();
        } catch (err) { toast('操作失败: ' + err.message); }
    }

        if (panel.style.display !== 'none' && !e.target.closest('.fg-url')) {

    // ========== Data ==========
    async function loadAnimeList() { try { allAnimeList = await request(`${API_BASE}/list`); renderAll(); } catch (err) { toast('加载失败: ' + err.message); } }

    function getFilteredList() {
        let list = [...allAnimeList];
        if (selectedStatuses.size > 0) list = list.filter(a => selectedStatuses.has(a.status));
        if (activeQuick === 'today') list = list.filter(a => a.updateDay === today);
        else if (activeQuick === 'highscore') list = list.filter(a => a.rating != null && a.rating >= 8);
        if (dayFilter !== null) list = list.filter(a => a.updateDay === dayFilter);
        if (searchQuery) { const q = searchQuery.toLowerCase(); list = list.filter(a => a.name && a.name.toLowerCase().includes(q)); }
        list.sort((a, b) => activeQuick === 'recent' ? (b.id - a.id) : (a.updateDay - b.updateDay || a.id - b.id));
        return list;
    }

    function toggleStatus(status) { if (status === 'all') { selectedStatuses.clear(); } else { selectedStatuses.has(status) ? selectedStatuses.delete(status) : selectedStatuses.add(status); } renderAll(); }
    function toggleQuick(quick) { activeQuick = (activeQuick === quick) ? null : quick; renderAll(); }

    function updateHeatmapSummary() {
        const totalDays = Object.keys(heatmapData).length;
        const totalCount = Object.values(heatmapData).reduce((a, b) => a + b, 0);
        document.getElementById('heatmapSummary').textContent =
            totalDays > 0 ? `${totalDays} 天打卡 · 共 ${totalCount} 集` : '暂无打卡记录';
    }

    function renderHeatmap() {
        const grid = document.getElementById('heatmapGrid');
        grid.innerHTML = '';

        // Past 53 weeks (~1 year), ending today
        const now = new Date();
        const todayDay = now.getDay() || 7; // 1=Mon, 7=Sun
        // Start from last Monday (go back to include full weeks)
        const daysSinceMonday = todayDay - 1;
        const startDate = new Date(now);
        startDate.setDate(now.getDate() - daysSinceMonday - 52 * 7 + 1);

        // Day labels (Mon-Sun)
        const dayNames = ['', '一','二','三','四','五','六','日'];
        const dayCol = document.createElement('div');
        dayCol.className = 'heatmap-day-col';
        for (let d = 1; d <= 7; d++) {
            const span = document.createElement('span');
            span.textContent = dayNames[d];
            dayCol.appendChild(span);
        }
        grid.appendChild(dayCol);

        const weeksWrap = document.createElement('div');
        weeksWrap.className = 'heatmap-weeks';

        // Generate 53 weeks
        for (let w = 0; w < 53; w++) {
            const week = document.createElement('div');
            week.className = 'heatmap-week';
            for (let d = 0; d < 7; d++) {
                const cell = document.createElement('div');
                cell.className = 'heatmap-cell';
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + w * 7 + d);
                const dateStr = date.toISOString().slice(0, 10);

                if (date > now) {
                    // Future dates: empty
                    cell.style.background = 'transparent';
                } else {
                    const count = heatmapData[dateStr] || 0;
                    if (count > 0) {
                        cell.classList.add('has');
                        cell.title = `${dateStr}: ${count} 次打卡`;
                        // Green gradient levels
                        if (count >= 5) cell.style.background = '#216e39';
                        else if (count >= 3) cell.style.background = '#30a14e';
                        else if (count >= 2) cell.style.background = '#40c463';
                        else cell.style.background = '#9be9a8';
                    }
                }
                week.appendChild(cell);
            }
            weeksWrap.appendChild(week);
        }
        grid.appendChild(weeksWrap);
    }

        for (const s of Object.keys(statusMap)) counts[s] = allAnimeList.filter(a => a.status === s).length;

        document.getElementById('chip-all').textContent = counts.all;
        for (const s of Object.keys(statusMap)) document.getElementById('chip-' + s).textContent = counts[s] || 0;

    function renderTable() {

        const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';

        if (list.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:36px;">暂无番剧</td></tr>'; return; }

        list.forEach(anime => {
            const pct = anime.totalEp ? Math.round(anime.currentEp / anime.totalEp * 100) : -1;
            let barColor = '#adb5bd';
            if (anime.status === 'completed') barColor = '#28a745';
            else if (pct >= 80) barColor = '#667eea';
            else if (pct >= 50) barColor = '#17a2b8';

            const row = tbody.insertRow();
            row.insertCell(0).innerText = anime.id;

            const nc = row.insertCell(1);
            nc.className = 'td-name';
            nc.innerHTML = `${anime.coverUrl ? `<img class="tbl-cover" src="${anime.coverUrl}" alt="" onerror="this.style.display='none'">` : ''}<span class="name-link" onclick="showDetail(allAnimeList.find(a=>a.id===${anime.id}))">${escapeHtml(anime.name)}</span>`;

            const pc = row.insertCell(2);
            if (anime.totalEp && anime.totalEp > 0) {
                pc.innerHTML = `<div class="prog"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${barColor}"></div></div><span class="prog-num">${anime.currentEp}/${anime.totalEp}</span></div>`;
            } else {
                pc.innerHTML = `<span class="prog-num">${anime.currentEp}/?</span>`;
            }

            row.insertCell(3).innerText = dayMap[anime.updateDay] || anime.updateDay;
            row.insertCell(4).innerText = anime.rating || '-';
            row.insertCell(5).innerHTML = `<span class="badge bd-${anime.status||'watching'}">${statusMap[anime.status]||anime.status}</span>`;
            let lw = anime.lastWatchDate || '-';
            if (anime.lastWatchDate === todayStr) lw = `<span style="color:#28a745;font-weight:600">${anime.lastWatchDate}</span>`;
            row.insertCell(6).innerHTML = lw;

            const act = row.insertCell(7); act.className = 'act';

            const incBtn = doc('button', 'btn-primary btn-sm', '+1集');
            incBtn.onclick = () => incrementEp(anime.id);
            if (anime.status !== 'completed') {
                const doneBtn = doc('button', 'btn-success btn-sm', '完结');
                doneBtn.onclick = () => markCompleted(anime.id);
                act.appendChild(doneBtn);
            }
            const editBtn = doc('button', 'btn-warning btn-sm', '编辑');
            editBtn.onclick = () => startEdit(anime);
            const delBtn = doc('button', 'btn-danger btn-sm', '删除');
            delBtn.onclick = () => deleteAnime(anime.id);
            const goBtn = doc('button', 'btn-outline btn-sm', '观看');
            goBtn.onclick = () => window.open(anime.websiteUrl, '_blank');

            act.appendChild(incBtn); act.appendChild(editBtn); act.appendChild(delBtn); act.appendChild(goBtn);
        });
    }

    function renderCalendar() {
        const list = getFilteredList();
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        for (let d = 1; d <= 7; d++) {
            const dayAnime = list.filter(a => a.updateDay === d);
            const col = document.createElement('div');
            col.className = 'cal-day' + (d === today ? ' today' : '');
            col.innerHTML = `<div class="day-name">${dayMap[d]}</div><div class="day-num">${dayAnime.length}</div>`;
            if (dayAnime.length === 0) { col.innerHTML += '<div class="cal-empty">暂无</div>'; }
            else {
                dayAnime.forEach(a => {
                    const pct = a.totalEp ? Math.round(a.currentEp / a.totalEp * 100) : 0;
                    const c = a.status === 'completed' ? '#28a745' : (pct >= 80 ? '#667eea' : '#adb5bd');
                    const item = document.createElement('div');
                    item.className = 'cal-item';
                    item.innerHTML = `${a.coverUrl ? `<img class="cal-cover" src="${a.coverUrl}" alt="" onerror="this.style.display='none'" style="margin-right:6px">` : ''}<div class="mbar"><div class="mfill" style="width:${pct}%;background:${c}"></div></div><span class="mname" title="${escapeHtml(a.name)}">${escapeHtml(a.name)}</span>`;
                    item.onclick = () => showDetail(a);

    // ========== CRUD ==========
    function submitForm() {
        const coverUrl = document.getElementById('editId').dataset.coverUrl || '';
        const data = { name: document.getElementById('name').value.trim(), currentEp: parseInt(document.getElementById('currentEp').value) || 0, totalEp: parseInt(document.getElementById('totalEp').value) || null, websiteUrl: document.getElementById('websiteUrl').value.trim(), updateDay: parseInt(document.getElementById('updateDay').value), rating: parseInt(document.getElementById('rating').value) || null, status: document.getElementById('status').value, lastWatchDate: todayStr, coverUrl: coverUrl };
        if (!data.name || !data.websiteUrl) { toast('番剧名称和网址不能为空'); return; }
        if (data.totalEp && data.currentEp > data.totalEp) { toast('当前集数不能超过总集数'); return; }

        editId ? (data.id = parseInt(editId), updateAnime(data)) : addAnime(data);
    }

    async function addAnime(data) { try { await request(API_BASE, { method: 'POST', body: JSON.stringify(data) }); toast('添加成功'); resetForm(); loadAnimeList(); } catch (err) { toast('添加失败: ' + err.message); } }
    async function updateAnime(data) { try { await request(API_BASE, { method: 'PUT', body: JSON.stringify(data) }); toast('更新成功'); resetForm(); loadAnimeList(); } catch (err) { toast('更新失败: ' + err.message); } }

    function startEdit(anime) {
        document.getElementById('formTitle').innerText = '编辑番剧'; document.getElementById('formDot').style.background = '#fd7e14';
        document.getElementById('editId').value = anime.id; document.getElementById('name').value = anime.name;
        document.getElementById('currentEp').value = anime.currentEp; document.getElementById('totalEp').value = anime.totalEp || '';
        document.getElementById('websiteUrl').value = anime.websiteUrl; document.getElementById('updateDay').value = anime.updateDay;
        document.getElementById('rating').value = anime.rating || ''; document.getElementById('status').value = anime.status || 'watching';
        document.getElementById('editId').dataset.coverUrl = anime.coverUrl || '';
        document.getElementById('submitBtn').innerText = '保存修改'; document.getElementById('cancelEditBtn').style.display = '';
        document.getElementById('name').focus(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function cancelEdit() { resetForm(); toast('已取消编辑'); }
    function resetForm() {
        document.getElementById('formTitle').innerText = '添加新番剧'; document.getElementById('formDot').style.background = '#667eea';
        document.getElementById('editId').value = ''; document.getElementById('name').value = ''; document.getElementById('currentEp').value = 0;
        document.getElementById('totalEp').value = ''; document.getElementById('websiteUrl').value = ''; document.getElementById('updateDay').value = '1';
        document.getElementById('rating').value = ''; document.getElementById('status').value = 'watching';
        document.getElementById('submitBtn').innerText = '添加'; document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('editId').dataset.coverUrl = '';
    }

    async function incrementEp(id) { try { const resp = await fetch(`${API_BASE}/increment/${id}`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }); if (resp.status === 429) { toast('操作太频繁，请稍后再试'); return; } if (resp.status === 409) { toast('已达到总集数，无法继续递增'); return; } if (!resp.ok) throw new Error(resp.statusText); toast('集数 +1'); loadAnimeList(); } catch (err) { toast('操作失败: ' + err.message); } }
    async function markCompleted(id) { if (!confirm('确定标记为已完结吗？')) return; try { await request(`${API_BASE}/complete/${id}`, { method: 'POST' }); toast('已完结'); loadAnimeList(); } catch (err) { toast('操作失败: ' + err.message); } }
    async function deleteAnime(id) { if (!confirm('确定删除吗？')) return; try { await request(`${API_BASE}/${id}`, { method: 'DELETE' }); toast('已删除'); loadAnimeList(); } catch (err) { toast('操作失败: ' + err.message); } }

    function doc(tag, cls, text) { const el = document.createElement(tag); if (cls) el.className = cls; if (text) el.innerText = text; return el; }
    function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.appendChild(document.createTextNode(str)); return div.innerHTML; }
    function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }

    // ========== Chat ==========
    let chatOpen = false;
    let chatLoading = false;

    function clampToViewport(panel) {
        const pw = panel.offsetWidth, ph = panel.offsetHeight;
        const vw = window.innerWidth, vh = window.innerHeight;
        const l = parseInt(panel.style.left) || 0;
        const t = parseInt(panel.style.top) || 0;
        panel.style.left = Math.max(0, Math.min(vw - pw - 24, l)) + 'px';
        panel.style.top  = Math.max(0, Math.min(vh - ph - 24, t)) + 'px';
    }

    function initChatPanelPosition() {
        const panel = document.getElementById('chatPanel');
        if (panel.style.left) { clampToViewport(panel); return; }
        const w = window.innerWidth, h = window.innerHeight;
        const pw = 380, ph = 520;
        panel.style.left = Math.max(0, w - pw - 24) + 'px';
        panel.style.top  = Math.max(0, h - ph - 92) + 'px';
        clampToViewport(panel);
    }

    window.addEventListener('resize', function() {
        const panel = document.getElementById('chatPanel');
        if (panel.style.left) clampToViewport(panel);
    });

    function toggleChat() {
        chatOpen = !chatOpen;
        const panel = document.getElementById('chatPanel');
        const fab = document.getElementById('chatFab');
        if (chatOpen) { initChatPanelPosition(); panel.classList.add('open'); fab.classList.add('hidden'); document.getElementById('chatInput').focus(); }
        else { panel.classList.remove('open'); fab.classList.remove('hidden'); }
    }

    // Drag
    (function() {
        const header = document.querySelector('.chat-panel-header');
        const panel = document.getElementById('chatPanel');
        let dragging = false, startX, startY, startLeft, startTop;

        header.addEventListener('mousedown', function(e) {
            if (e.target.closest('.chat-close')) return;
            dragging = true;
            header.classList.add('dragging');
            startX = e.clientX; startY = e.clientY;
            startLeft = panel.offsetLeft;
            startTop = panel.offsetTop;
            panel.style.transition = 'none';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            if (!dragging) return;
            const maxLeft = window.innerWidth - panel.offsetWidth;
            const maxTop  = window.innerHeight - panel.offsetHeight;
            const left = Math.max(0, Math.min(maxLeft, startLeft + (e.clientX - startX)));
            const top  = Math.max(0, Math.min(maxTop, startTop + (e.clientY - startY)));
            panel.style.left = left + 'px';
            panel.style.top  = top + 'px';
        });

        document.addEventListener('mouseup', function() {
            if (!dragging) return;
            dragging = false;
            header.classList.remove('dragging');
            document.body.style.userSelect = '';
            panel.style.transition = 'opacity 0.25s, transform 0.25s, background 0.3s';
        });
    })();

    // Resize
    (function() {
        const handle = document.getElementById('chatResizeHandle');
        const panel = document.getElementById('chatPanel');
        let resizing = false, startX, startY, startW, startH;

        handle.addEventListener('mousedown', function(e) {
            resizing = true;
            startX = e.clientX; startY = e.clientY;
            startW = panel.offsetWidth;
            startH = panel.offsetHeight;
            panel.style.transition = 'none';
            document.body.style.userSelect = 'none';
            e.preventDefault();
            e.stopPropagation();
        });

        document.addEventListener('mousemove', function(e) {
            if (!resizing) return;
            const w = Math.max(320, Math.min(window.innerWidth * 0.8, startW + (e.clientX - startX)));
            const h = Math.max(360, Math.min(window.innerHeight * 0.9, startH + (e.clientY - startY)));
            panel.style.width  = w + 'px';
            panel.style.height = h + 'px';
        });

        document.addEventListener('mouseup', function() {
            if (!resizing) return;
            resizing = false;
            document.body.style.userSelect = '';
            panel.style.transition = 'opacity 0.25s, transform 0.25s, background 0.3s';
        });
    })();

    function addChatMessage(role, text) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'chat-message ' + role;
        if (role === 'assistant') {
            div.innerHTML = typeof marked !== 'undefined' ? marked.parse(text) : text;
        } else {
            div.textContent = text;
        }
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'chat-typing';
        div.id = 'chatTyping';
        div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('chatTyping');
        if (el) el.remove();
    }

    async function sendMessage() {
        if (chatLoading) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        addChatMessage('user', text);
        chatLoading = true;
        showTyping();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ message: text })
            });
            if (!res.ok) throw new Error(await res.text());

            hideTyping();
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            const msgDiv = createStreamingMessage();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                    if (line.startsWith('data:')) {
                        const token = line.slice(5).trim();
                        if (token && !token.startsWith('[DONE]')) {
                            appendToken(msgDiv, token);
                        }
                    }
                }
            }
            finalizeStreamingMessage(msgDiv);
        } catch (err) {
            hideTyping();
            addChatMessage('assistant', '抱歉，AI 助手暂时不可用 😢\n请检查网络或稍后再试。');
        } finally {
            chatLoading = false;
        }
    }

    function createStreamingMessage() {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'chat-message assistant';
        div._rawText = '';
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function appendToken(div, token) {
        div._rawText += token;
        div.innerHTML = typeof marked !== 'undefined'
            ? marked.parse(div._rawText)
            : div._rawText.replace(/\n/g, '<br>');
        const container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
    }

    function finalizeStreamingMessage(div) {
        div.innerHTML = typeof marked !== 'undefined'
            ? marked.parse(div._rawText)
            : div._rawText.replace(/\n/g, '<br>');
        delete div._rawText;
    }

    function sendQuick(text) {
        if (!chatOpen) toggleChat();
        document.getElementById('chatInput').value = text;
        sendMessage();
    }

    (function() { const btn = document.querySelector(`.day-pills button[data-day="${today}"]`); if (btn) btn.classList.add('today-ring'); })();

    // Init heatmap state
    heatmapOpen = localStorage.getItem('heatmapOpen') === '1';
    applyHeatmapState();
    if (heatmapOpen) loadHeatmap();

    // Init extra filters state
    extraFiltersOpen = localStorage.getItem('extraFiltersOpen') === '1';
    applyExtraFiltersState();

    loadAnimeList();
</script>
