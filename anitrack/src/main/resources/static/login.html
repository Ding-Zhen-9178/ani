<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AnimeTrack</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            background: #fff; border-radius: 16px; padding: 40px; width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center;
        }
        .login-card h1 { font-size: 24px; margin-bottom: 4px; color: #333; }
        .login-card .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 16px; font-size: 15px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            transition: border-color 0.2s; outline: none;
        }
        .form-group input:focus { border-color: #667eea; }
        .submit-btn {
            width: 100%; padding: 12px; font-size: 16px; font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 8px; cursor: pointer;
            transition: opacity 0.2s; margin-top: 6px;
        }
        .submit-btn:hover { opacity: 0.9; }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 10px; min-height: 20px; }
        .toggle-link {
            margin-top: 16px; font-size: 13px; color: #888;
        }
        .toggle-link a { color: #667eea; cursor: pointer; text-decoration: none; }
        .toggle-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>AnimeTrack</h1>
    <p class="subtitle">个人追番进度管理器</p>
    <form onsubmit="submitForm(event)">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" maxlength="30" autofocus required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group" id="confirmGroup" style="display:none">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入密码">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">登 录</button>
        <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="toggle-link">
        <span id="toggleText">没有账号？</span>
        <a id="toggleLink" onclick="toggleMode()">立即注册</a>
    </div>
</div>

<script>
    if (localStorage.getItem('token')) {
        window.location.href = '/index.html';
    }

    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('submitBtn').textContent = isLogin ? '登 录' : '注 册';
        document.getElementById('confirmGroup').style.display = isLogin ? 'none' : '';
        document.getElementById('confirmPassword').required = !isLogin;
        document.getElementById('toggleText').textContent = isLogin ? '没有账号？' : '已有账号？';
        document.getElementById('toggleLink').textContent = isLogin ? '立即注册' : '返回登录';
        document.getElementById('errorMsg').textContent = '';
        document.title = (isLogin ? '登录' : '注册') + ' - AnimeTrack';
    }

    async function submitForm(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('errorMsg');
        errorEl.textContent = '';

        if (!username) {
            errorEl.textContent = '请输入用户名';
            return;
        }
        if (password.length < 4) {
            errorEl.textContent = '密码至少4位';
            return;
        }
        if (!isLogin) {
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) {
                errorEl.textContent = '两次密码不一致';
                return;
            }
        }

        const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('createdAt', data.createdAt || '');
                window.location.href = '/index.html';
            } else {
                errorEl.textContent = data.error || '操作失败';
            }
        } catch (err) {
            errorEl.textContent = '网络错误，请重试';
        }
    }
</script>
</body>
</html>
